  cryptography: ^2.9.0
  uuid: ^4.6.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
