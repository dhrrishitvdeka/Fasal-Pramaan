publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1
  connectivity_plus: ^7.3.0
  geolocator: ^14.0.3
  camera: ^0.12.0+2
  image: ^4.9.1
  path_provider: ^2.1.6
  path: ^1.9.1
